<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICKHAVEN | Home</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js" defer></script>
</head>
<body>
      <header class="header">
        <h1 class="store-title">BRICKHAVEN</h1>
    
        <nav class="navbar">
            <a href="./index.html">Home</a>
            <a href="./shop.html">Shop</a>

        </nav>
     </header>
    
    <section class="hero">
        <h2>Discover Authentic LEGO Sets</h2>
        <p>From Star Wars to Ninjago to Marvel to DC Universe and even to retired collector editions.</p>
    </section>

    <section class = "slider">
        <div class = "slider-track">
            <img src="./images/SlideAdOne.jpg" class= "slide active" alt = "Slide 1">
            <img src ="./images/SlideAdStarWars.jpg" class="slide" alt = "Slide 2">
            <img src ="./images/SlideAdThree.jpg" class="slide" alt="Slide 3">
        </div>

        <button class = "slider-btn prev" onclick="prevSlide()">&larr;</button>
        <button class = "slider-btn next" onclick="nextSlide()">&rarr;</button>

        <div class ="slider-dots">
            <span class="dot active"onclick ="goToSlide(0)"></span>
            <span class="dot" onclick="goToSlide(1)"></span>
            <span class="dot" onclick="goToSlide(2)"></span>
        </div>
    </section>
    
    <section class="categories">
        <h2>Collections</h2>

        <div class="cards">
            <a href="./shop.html?category=star-wars" class = "card">
                <img src="./images/starwars.jpg" alt="Star Wars Lego">
                <span class= "card-label"> Star Wars </span>
            </a>
            <a href="./shop.html?category=ninjago" class = "card">
                <img src ="./images/ninjago.jpg" alt = "Ninjago Lego">
                <span class="card-label">Ninjago</span>
            </a>
            <a href="./shop.html?category=marvel" class = "card">
                <img src="./images/marvel.jpg" alt = "Marvel Lego">
                <span class = "card-label"> Marvel</span>
            </a>
            <a href="./shop.html?category=dc-universe" class = "card">
                <img src = "./images/dc.jpg" alt = "DC Lego">
                <span class = "card-label"> DC Universe</span>
            </a>
        
        </div>
    </section>

    <section class="featured">
        <h2>Featured Products</h2>
    </section>


    <div class="cardsfeatured">
            <a href="./shop.html?category=featured" class = "card2">
                <img src="./images/starwars.jpg" alt="Star Wars Lego">
                <span class= "card2-label"> Star Wars </span>
            </a>
            <a href="./shop.html?category=featured" class = "card2">
                <img src ="./images/ninjago.jpg" alt = "Ninjago Lego">
                <span class="card2-label">Ninjago</span>
            </a>
            <a href="./shop.html?category=featured" class = "card2">
                <img src="./images/marvel.jpg" alt = "Marvel Lego">
                <span class = "card2-label"> Marvel</span>
            </a>
            
    </div>
