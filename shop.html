<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To be Announced | Shop</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/shop.js" defer></script>
</head>
<body>

    <header class="header">
        <h1 class="store-title">To be Announced</h1>

        <nav class="navbar">
            <a href="./index.html">Home</a>
            <a href="./shop.html">Shop</a>
            <a href="./about.html">About</a>
            <a href="./cart.html">Cart</a>
        </nav>
        
    </header>

    <section class="shop-banner">
        <h2>Shop LEGO Sets</h2>
    </section>

    <nav class= "category-filters">
        <button class = "category-btn" data-category="featured">Featured</button>
        <button class = "category-btn" data-category="star-wars">Star Wars</button>
        <button class = "category-btn" data-category="ninjago">Ninjago</button>
        <button class = "category-btn" data-category="marvel">Marvel</button>
        <button class = "category-btn" data-category="dc-universe">DC Universe</button>
    </nav>

    <div class="shop-layout">

        <section class="products" id="products-container">
            
        </section>

        <aside class="cart-panel">
            <h3>Your Cart</h3>
            <ul id="cart-items">
                <li class="cart-empty">Your cart is empty.</li>
            </ul>
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-price">₱0.00</span>
            </div>
        </aside>

    </div>

    <footer>
        <p>© 2026 To be Announced</p>
    </footer>

    
</body>
</html>
